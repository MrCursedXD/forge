<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge — Live build</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body { background-image: none; }
  #frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; background: #fff; }

  .state {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.8rem; text-align: center; padding: 2rem;
  }
  .state .eyebrow { margin-bottom: 0.2rem; }
  .state h1 { font-size: 1.4rem; }
  .state p { color: var(--ink-soft); max-width: 40ch; margin: 0; }
  .state a { color: var(--ember); font-weight: 600; }

  .badge {
    position: fixed; bottom: 14px; right: 14px; z-index: 10;
    display: flex; align-items: center; gap: 0.4rem;
    background: var(--paper-raised); border: 1px solid var(--line);
    border-radius: 999px; padding: 0.4rem 0.8rem 0.4rem 0.6rem;
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-soft);
    box-shadow: var(--shadow); text-decoration: none;
  }
  .badge .brand-mark { width: 16px; height: 16px; border-radius: 4px; background: var(--ink); position: relative; flex-shrink:0; }
  .badge .brand-mark::after { content: ""; position: absolute; inset: 4px; background: var(--ember); clip-path: polygon(0 100%, 100% 100%, 50% 0); }
</style>
</head>
<body>

<div class="state" id="loading-state">
  <span class="eyebrow">Forge</span>
  <h1>Loading this build…</h1>
</div>

<div class="state" id="error-state" style="display:none;">
  <span class="eyebrow">Forge</span>
  <h1 id="error-title">Build not found</h1>
  <p id="error-detail">This link may be broken, or the build was deleted.</p>
  <a href="index.html">Build your own at Forge →</a>
</div>

<iframe id="frame" title="Live build" style="display:none;" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
<a class="badge" href="index.html" id="badge" style="display:none;">
  <span class="brand-mark"></span> Built with Forge
</a>

<script type="module" src="js/view.js"></script>
</body>
</html>
